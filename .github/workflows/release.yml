name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset_name: gobug-windows-amd64.exe
          - os: macos-latest
            platform: darwin/universal
            asset_name: gobug-macos-universal.zip
          - os: ubuntu-22.04
            platform: linux/amd64
            asset_name: gobug-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package macOS app (zip the .app bundle)
        if: matrix.os == 'macos-latest'
        run: cd build/bin && zip -r ../../${{ matrix.asset_name }} gobug.app

      - name: Rename Windows binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item build/bin/gobug.exe ${{ matrix.asset_name }}

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-22.04'
        run: cp build/bin/gobug ${{ matrix.asset_name }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
